services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/haircut_booking"
      GOOGLE_OAUTH_CREDENTIALS_PATH: "/app/gcp-oauth.keys.json"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - ~/.config/google-calendar-mcp:/root/.config/google-calendar-mcp
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: haircut_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
